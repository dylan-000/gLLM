services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_ALLOW_RUNTIME_LORA_UPDATING=True
    ports:
      - "${PORT:-8000}:8000"
    ipc: host
    command: >
      ${MODEL:-Qwen/Qwen2.5-7B-Instruct}
      --host 0.0.0.0
      --trust-remote-code
      --served-model-name "gLLM Default"
      --dtype ${dtype:-auto}
      --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION:-0.9}
      --max-model-len 32768
      --enable-lora
      --max-lora-rank 64
      --max-loras 8
      --max-cpu-loras 10
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --enable-prefix-caching

  unsloth:
    image: unsloth/unsloth:latest
    container_name: unsloth
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    ports:
      - "8002:8000"
    ipc: host
    command: jupyter lab --ip=0.0.0.0 --port=8000 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''
